<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>Recipedia - Backend</title>
  </head>
  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
      font-family: 'Quicksand', sans-serif;
    "
  >
    <div
      style="
        background: #ffffff;
        color: #3d3436;
        border-radius: 24px;
        text-align: center;
        max-width: 520px;
        width: 100%;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        overflow: hidden;
      "
    >
      <!-- Top Pattern -->
      <div
        style="width: 100%; height: auto; padding: 20px; box-sizing: border-box"
      >
        <img
          src="https://res.cloudinary.com/dee339rpr/image/upload/v1763349597/Recipedia_Pattern_tib8sj.png"
          alt="Recipedia Pattern"
          style="
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px 12px 0 0;
          "
        />
      </div>

      <!-- Content -->
      <div style="padding: 40px 40px 48px 40px">
        <!-- Logo -->
        <div style="margin-bottom: 24px">
          <img
            src="https://res.cloudinary.com/dee339rpr/image/upload/v1763349597/Recipedia-logo-square_rrtoxp.png"
            alt="Recipedia Logo"
            style="width: 80px; height: auto"
          />
        </div>

        <!-- Heading -->
        <h1
          style="
            margin: 0 0 8px 0;
            font-weight: 700;
            font-size: 28px;
            color: #2d2d2d;
          "
        >
          Welcome to Recipedia
        </h1>

        <h2
          style="
            margin: 0 0 16px 0;
            font-weight: 700;
            font-size: 20px;
            color: #ff7e5f;
          "
        >
          Discover, cook, and share recipes you love.
        </h2>

        <p
          style="
            font-size: 16px;
            margin: 0 0 16px 0;
            font-weight: 400;
            line-height: 1.6;
          "
        >
          Create an account to save your favorite dishes, remix recipes, and
          connect with other food lovers.
        </p>

        <!-- CTA buttons -->
        <div
          style="
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
          "
        >
          <a
            href="https://recipedia-backend-6gp7.onrender.com/api-docs/"
            style="
              background: #fff5f2;
              color: #ff7e5f;
              text-decoration: none;
              padding: 10px 22px;
              border-radius: 12px;
              font-weight: 700;
              font-size: 15px;
              border: 1px solid #ff7e5f33;
            "
          >
            API Documentation
          </a>
          <a
            href="https://recipedia-frontend-omega.vercel.app/"
            style="
              background: #ff7e5f;
              color: #ffffff;
              text-decoration: none;
              padding: 10px 22px;
              border-radius: 12px;
              font-weight: 700;
              font-size: 15px;
              box-shadow: 0 4px 12px rgba(255, 126, 95, 0.4);
            "
          >
            Get Started
          </a>
        </div>

        <!-- Small note -->
        <!-- <p
          style="
            font-size: 13px;
            margin: 24px 0 0 0;
            color: #999;
            line-height: 1.5;
          "
        >
          Prefer the API? Visit <code>/api/docs</code> for documentation.
        </p> -->
      </div>

      <!-- Bottom Pattern -->
      <div
        style="width: 100%; height: auto; padding: 20px; box-sizing: border-box"
      >
        <img
          src="https://res.cloudinary.com/dee339rpr/image/upload/v1763349597/Recipedia_Pattern_tib8sj.png"
          alt="Recipedia Pattern"
          style="
            width: 100%;
            height: auto;
            display: block;
            transform: rotate(180deg);
            border-radius: 0 0 12px 12px;
          "
        />
      </div>
    </div>
  </body>
</html>
